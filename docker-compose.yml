services:
  db:
    image: mariadb:11
    container_name: cerebrus-db
    environment:
      MARIADB_DATABASE: cerebrus
      MARIADB_USER: cerebrus
      MARIADB_PASSWORD: cerebrus
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: cerebrus-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mariadb://db:3306/cerebrus
      DB_USER: cerebrus
      DB_PASSWORD: cerebrus
    
      GOOGLE_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: cerebrus-frontend
    environment:
      VITE_LOGROCKET_ID: "${LOGROCKET_ID}"
      VITE_LOGROCKET_MANUAL_RECORDING: "${LOGROCKET_MANUAL_RECORDING:-true}"
    depends_on:
      - backend
    ports:
      - "3000:80"

  watchbug-service:
    build: 
      context: ./watchbug-app
    container_name: watchbug
    ports:
      - "5000:5000"
    environment:
      - WATCHBUG_ENABLED=True
      - WATCHBUG_ADMIN=true
      - SENTRY_DSN=${SENTRY_DSN}
      - LOGROCKET_ID=${LOGROCKET_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_BUCKET_NAME=watchbug-screenshots
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}

volumes:
  dbdata: