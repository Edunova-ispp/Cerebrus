[supervisord]
nodaemon=true
user=root

[program:backend]
command=java -Xmx300m -jar /app/backend.jar --server.port=8080
autostart=true 
autorestart=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:nginx]
command=nginx -g 'daemon off;'
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:watchbug]
command=/opt/venv/bin/python -u /app/server.py
environment=PORT="5000",HOST="127.0.0.1",CORS_ORIGINS="*"
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0