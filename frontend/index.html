<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CerebrUS</title>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Función para limpiar variables no reemplazadas por Vite
      const env = (val, fallback) => (val && !val.startsWith('%')) ? val : fallback;
      
      globalThis.__WATCHBUG_CONFIG__ = {
          enabled: true,
          admin: env("%WATCHBUG_ADMIN%", "false") === "true",
          services: {
              sentry: true, 
              logrocket: true,
              supabase: true
          },
          apiEndpoint: env("%WATCHBUG_API_URL%", "http://localhost:5000/watchbug/report"),
          logrocketId: env("%LOGROCKET_ID%", null),
          logrocketManual: env("%LOGROCKET_MANUAL_RECORDING%", "true") === "true"
      };
    </script>
    <script src="/watchbug-widget.js"></script>
  </body>
</html>
